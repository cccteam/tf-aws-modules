name: Release Please

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions: {}

jobs:
  release-please:
    uses: cccteam/github-workflows/.github/workflows/release-please.yml@5be491dfaa55f4e80e42bbef5dbe7ca7027f612f # v6.1.1
    permissions:
      contents: write
      pull-requests: write
    with:
      config-file: release-please-config.json
      manifest-file: .release-please-manifest.json
    secrets:
      RELEASE_PLEASE_APP_ID: ${{ secrets.RELEASE_PLEASE_APP_ID }}
      RELEASE_PLEASE_APP_PEM: ${{ secrets.RELEASE_PLEASE_APP_PEM }}