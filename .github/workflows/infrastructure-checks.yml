name: Infrastructure Checks

permissions:
  contents: read

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened] # these are the defaults - synchronize means 'commits pushed to PR'

jobs:
  terraform-ci:
    name: Terraform CI
    uses: cccteam/github-workflows/.github/workflows/terraform-ci.yml@4987befcc33b8c6a81741990bb9818d55e7446fe # v6.0.0
    with:
      terraform_version: '1.14.3'
      upload_sarif: true
    secrets:
      app_id: ${{ secrets.TERRAFORM_APP_ID }}
      app_pem: ${{ secrets.TERRAFORM_APP_PEM }}
    permissions:
      actions: read
      contents: write
      pull-requests: write
      security-events: write