name: CI

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened] # these are the defaults - synchronize means 'commits pushed to PR'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  semantic-pull-request-title:
    uses: cccteam/github-workflows/.github/workflows/semantic-pull-request-title.yml@5be491dfaa55f4e80e42bbef5dbe7ca7027f612f # v6.1.1
    permissions:
      pull-requests: read