name: CI

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened] # these are the defaults - synchronize means 'commits pushed to PR'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  semantic-pull-request-title:
    uses: cccteam/github-workflows/.github/workflows/semantic-pull-request-title.yml@1ccb2a0d5c48271b34c23abb3821e365019838be # v5.24.0
    permissions:
      pull-requests: read