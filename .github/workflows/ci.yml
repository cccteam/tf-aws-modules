name: CI

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened] # these are the defaults - synchronize means 'commits pushed to PR'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  semantic-pull-request-title:
    uses: cccteam/github-workflows/.github/workflows/semantic-pull-request-title.yml@4987befcc33b8c6a81741990bb9818d55e7446fe # v6.0.0
    permissions:
      pull-requests: read